name: Workifind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Validate: runs on every push and PR. Gates the deploy job below.
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_CLERK_SIGN_UP_FALLBACK_URL: /
      NEXT_CLERK_SIGN_IN_FALLBACK_URL: /

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        # `npm ci` is reproducible and fails on an out-of-sync lockfile.
        # (postinstall runs `prisma generate`.)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check & Build
        # `next build` type-checks and validates the Prisma schema.
        run: npm run build

      - name: Audit Dependencies
        # Informational: surfaces known advisories without blocking the pipeline
        # on transitive issues. Tighten to blocking once the tree is clean.
        run: npm audit --audit-level=high
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Deploy: only on push to main, and only after validate passes.
  # ---------------------------------------------------------------------------
  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Database Migrations
        # Applies committed migrations to the production database (replaces the
        # old `prisma db push` in the build script). NOTE: the existing DB must
        # be baselined once before the first run:
        #   npx prisma migrate resolve --applied 0_init
        run: npx prisma migrate deploy

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
